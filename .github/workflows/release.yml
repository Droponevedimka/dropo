name: Create Release Record

# GitHub Actions creates the immutable tag and information page only after the
# clean-Windows package workflow has passed. Verified Windows/Android artifacts
# are uploaded separately; no signing keys are stored in Actions.
on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Windows package release gate"]
    types: [completed]

permissions:
  contents: read

jobs:
  release-record:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Reject generated contributor metadata
        shell: pwsh
        run: .\tools\check-clean-contributors.ps1

      - name: Verify release contains the latest blocked lists
        shell: pwsh
        run: .\scripts\filters\update-blocked-lists.ps1 -CheckOnly

      - name: Read version and check existing release
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content version.json -Raw | ConvertFrom-Json).version
          $tag = "v$version"
          "version=$version" | Out-File $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Append
          $PSNativeCommandUseErrorActionPreference = $false
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists; leaving it immutable."
            "exists=true" | Out-File $env:GITHUB_OUTPUT -Append
          } elseif ($LASTEXITCODE -eq 1) {
            "exists=false" | Out-File $env:GITHUB_OUTPUT -Append
            $global:LASTEXITCODE = 0
          } else {
            throw "gh release view failed with exit code $LASTEXITCODE"
          }

      - name: Prepare release information
        if: steps.version.outputs.exists == 'false'
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $repo = "${{ github.repository }}"
          $strictUtf8 = [System.Text.UTF8Encoding]::new($false, $true)
          $templatePath = (Resolve-Path ".github/release-notes-template.md").Path
          $notes = [IO.File]::ReadAllText($templatePath, $strictUtf8)
          $notes = $notes.Replace("{{TAG}}", $tag)
          $notes = $notes.Replace("{{REPOSITORY}}", $repo)
          if ($notes -match '\?{3,}' -or $notes -notmatch '[А-Яа-яЁё]') {
            throw "Release notes failed the UTF-8/Cyrillic integrity check."
          }
          [IO.File]::WriteAllText("release-notes.md", $notes, [System.Text.UTF8Encoding]::new($false))

      - name: Create release record
        if: steps.version.outputs.exists == 'false'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.event.workflow_run.head_sha || github.sha }}
          name: dropo ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
