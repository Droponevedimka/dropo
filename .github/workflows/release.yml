name: Auto Release

# You only bump "version" in version.json and push to main. CI then:
#   1. reads version.json -> v<version>;
#   2. checks if a release for that tag already exists -> if yes, does nothing;
#   3. otherwise builds from the current main, tags it v<version>, and publishes
#      a GitHub release with the small app archive.
# The heavy Windows dependencies archive is hosted once on the release tag where
# the dependencies last changed (recorded in deps-lock.json). New app releases
# reference that existing archive via dependencies.json.
# Versioning stays MANUAL (only version.json). Re-running on the same version is
# a no-op until you bump it.

on:
  push:
    branches: [main]
    paths:
      - "version.json"
      - ".github/workflows/release.yml"
  workflow_dispatch: {} # manual trigger for the current version.json

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version.json + check existing release
        id: ver
        shell: pwsh
        run: |
          $v = (Get-Content version.json -Raw | ConvertFrom-Json).version
          $tag = "v$v"
          "version=$v" | Out-File $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File $env:GITHUB_OUTPUT -Append
          $PSNativeCommandUseErrorActionPreference = $false
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          $releaseViewExit = $LASTEXITCODE
          if ($releaseViewExit -eq 0) {
            Write-Host "Release $tag already exists - nothing to do (bump version.json to release a new one)."
            "exists=true" | Out-File $env:GITHUB_OUTPUT -Append
          } elseif ($releaseViewExit -eq 1) {
            Write-Host "No release for $tag yet - will build and publish."
            "exists=false" | Out-File $env:GITHUB_OUTPUT -Append
            $global:LASTEXITCODE = 0
          } else {
            throw "gh release view failed with exit code $releaseViewExit"
          }

      # ---- Windows build (the only implemented platform) -------------------
      - uses: actions/setup-go@v5
        if: steps.ver.outputs.exists == 'false'
        with: { go-version: "1.22", cache-dependency-path: app/go.sum }
      - uses: subosito/flutter-action@v2
        if: steps.ver.outputs.exists == 'false'
        with:
          channel: stable
          cache: true

      - name: Build Windows portable app
        if: steps.ver.outputs.exists == 'false'
        shell: pwsh
        run: .\build.ps1 -AppOnly

      # ---- Locate the built app archive ------------------------------------
      # CI publishes only the small app zip. Clients fetch the heavy engines
      # from the tag recorded in deps-lock.json.
      - name: Gather assets
        id: assets
        if: steps.ver.outputs.exists == 'false'
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $dir = Get-ChildItem release -Directory |
            Where-Object { $_.Name -like "dropo-$v-*" } |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $dir) { throw "build output for $v not found" }
          $hostTag = [string]((Get-Content deps-lock.json -Raw | ConvertFrom-Json).tag)
          $depsAsset = [string]((Get-Content deps-lock.json -Raw | ConvertFrom-Json).asset)
          Write-Host "App release $v references the dependencies archive hosted at $hostTag."
          "dir=$($dir.FullName)" | Out-File $env:GITHUB_OUTPUT -Append
          "deps_tag=$hostTag" | Out-File $env:GITHUB_OUTPUT -Append
          "deps_asset=$depsAsset" | Out-File $env:GITHUB_OUTPUT -Append

      # ---- Publish: create the tag from main + the release -----------------
      - name: Publish release
        if: steps.ver.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: dropo ${{ steps.ver.outputs.tag }}
          body: |
            ## dropo ${{ steps.ver.outputs.tag }}

            Коротко: обновлен Windows UI, добавлен понятный прогресс подбора стратегий по сервисам, исправлена статистика трафика и защищен локальный bridge-token.

            ### Скачать

            | Версия | Файл | Ссылка | Примечание |
            | --- | --- | --- | --- |
            | Windows Portable x64 | `dropo-Windows-Portable-x64.zip` | [Скачать](https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/dropo-Windows-Portable-x64.zip) | Распакуйте и запустите `dropo.exe` |
            | Windows Dependencies x64 | `${{ steps.assets.outputs.deps_asset }}` | [Скачать](https://github.com/${{ github.repository }}/releases/download/${{ steps.assets.outputs.deps_tag }}/${{ steps.assets.outputs.deps_asset }}) | Движки VPN/обхода, приложение скачает само при первом запуске |
            | Android | `dropo-Android-universal.apk` | Скоро | В разработке |
            | macOS | `dropo-MacOS-arm64.dmg` | Скоро | В разработке |
            | Linux | `dropo-Linux-x64.AppImage` | Скоро | В разработке |

            ### Изменения

            - Статус сразу переключается в `Подключаем VPN` после клика.
            - Добавлена панель подбора стратегий обхода по сервисам с красным состоянием ошибки.
            - Длинные списки стратегий, подписок и рабочих сетей теперь скроллятся.
            - Статус Deep Windows/сетевого режима перенесен в меню.
            - Настройки открываются при активном VPN, но небезопасные изменения блокируются.
            - Статистика трафика теперь обновляется из sing-box API во время сессии.
          files: |
            ${{ steps.assets.outputs.dir }}/dropo-Windows-Portable-x64.zip
          fail_on_unmatched_files: false

  # ---- Future per-OS builds (add jobs, each uploads to the same tag) -------
  #   android: runs-on: ubuntu-latest  -> dropo-Android-universal.apk
  #   macos:   runs-on: macos-latest   -> dropo-MacOS-arm64.dmg
  #   linux:   runs-on: ubuntu-latest  -> dropo-Linux-x64.AppImage
  # They depend on `release` (tag already created) and use action-gh-release
  # with the same tag_name to append their assets.
